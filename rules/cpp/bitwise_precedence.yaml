id: bitwise-precedence
language: cpp
severity: error
message: "Bug: Relational operators (==) evaluate before bitwise operators (&, |, ^)."
tip: "Wrap the bitwise operation in parentheses: '(a & b) == 0'."
query: |
  (binary_expression
    operator: ["&" "|" "^"]
    right: (binary_expression
      operator: ["==" "!=" "<" "<=" ">" ">="]
    )
  ) @violation